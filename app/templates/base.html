<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Azure Billing{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 56px; }
    .navbar-brand { font-weight: 700; }
    .cost { font-family: monospace; }
    .table th { white-space: nowrap; }
    .truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">Azure Billing</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('imports.index') }}">Imports</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('subscriptions.index') }}">Subscriptions</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('invoices.index') }}">Invoices</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('resources.index') }}">Resources</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('storage.index') }}">Storage</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('meters.index') }}">Meters</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
