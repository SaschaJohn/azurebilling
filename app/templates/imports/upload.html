{% extends "base.html" %}
{% block title %}Upload CSV — Azure Billing{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h1 class="mb-4">Upload Azure Billing CSV</h1>
    <div class="card">
      <div class="card-body">
        <form method="post" action="{{ url_for('imports.upload') }}" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="file" class="form-label fw-semibold">CSV File</label>
            <input class="form-control" type="file" id="file" name="file" accept=".csv" required>
            <div class="form-text">Azure billing export in CSV format. Large files are processed via streaming.</div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Import</button>
            <a href="{{ url_for('imports.index') }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
  document.querySelector('form').addEventListener('submit', function () {
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Importing…';

    const alert = document.createElement('div');
    alert.className = 'alert alert-info mt-3';
    alert.textContent = 'Processing your file, please wait. This may take a minute for large files.';
    this.appendChild(alert);
  });
</script>
{% endblock %}
